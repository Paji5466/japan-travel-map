<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅行地图 - 旅行计划</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #e0e0e0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition: 0.2s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 顶部导航栏 */
        .navbar {
            background: var(--card-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 1000;
            gap: 12px;
            flex-shrink: 0;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
        }

        .navbar .logo i {
            color: var(--primary);
            font-size: 22px;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }
        .btn-outline.active {
            background: #fff0f0;
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 50%;
            justify-content: center;
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            color: var(--text);
            font-size: 16px;
        }
        .btn-icon:hover {
            background: #f5f5f5;
        }

        /* 主体容器 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* 地图区域 */
        .map-wrapper {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 地图控制按钮组 */
        .map-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .map-controls .btn-icon {
            width: 38px;
            height: 38px;
            box-shadow: var(--shadow);
            background: var(--card-bg);
        }

        /* 侧边栏 */
        .sidebar {
            width: 380px;
            background: var(--card-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform var(--transition);
            z-index: 500;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h3 .count {
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .search-box {
            margin: 12px 16px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition);
            font-family: inherit;
            background: var(--bg);
        }

        .search-box input:focus {
            border-color: var(--primary);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 14px;
        }

        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 0 16px;
            display: none;
            box-shadow: var(--shadow);
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition);
        }

        .search-result-item:hover {
            background: #fff5f5;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item i {
            color: var(--primary);
            font-size: 14px;
        }

        /* 标记点列表 */
        .marker-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
        }

        .marker-list::-webkit-scrollbar {
            width: 4px;
        }
        .marker-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        .marker-empty {
            text-align: center;
            padding: 40px 20px;
            color: #bbb;
        }
        .marker-empty i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }
        .marker-empty p {
            font-size: 14px;
            line-height: 1.6;
        }

        .marker-item {
            background: var(--bg);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all var(--transition);
            border: 1.5px solid transparent;
            position: relative;
        }

        .marker-item:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(231,76,60,0.12);
        }
        .marker-item.active {
            border-color: var(--primary);
            background: #fff5f5;
        }

        .marker-item.visited {
            opacity: 0.75;
            background: #f0faf4;
            border-color: #27ae60;
        }

        .marker-item .visited-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            color: #27ae60;
            font-weight: 600;
            padding: 2px 8px;
            background: #e8f8ef;
            border-radius: 10px;
            white-space: nowrap;
        }

        .marker-item .marker-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .marker-item .marker-number {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .marker-item .marker-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .marker-item .marker-date {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
        }

        .marker-item .marker-desc {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 6px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .marker-item .marker-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .marker-item .marker-actions .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 6px;
        }

        .marker-item .marker-image-thumb {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            width: 90%;
            max-width: 460px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.25s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            border-radius: 16px 16px 0 0;
            z-index: 1;
        }

        .modal-header h3 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            transition: all var(--transition);
        }

        .modal-close:hover {
            background: #eee;
            color: #333;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition);
            font-family: inherit;
            background: var(--bg);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg);
        }

        .image-upload-area:hover {
            border-color: var(--primary);
            background: #fff5f5;
        }

        .image-upload-area i {
            font-size: 32px;
            color: #ccc;
            margin-bottom: 8px;
            display: block;
        }

        .image-upload-area p {
            font-size: 13px;
            color: var(--text-light);
        }

        .image-preview {
            position: relative;
            display: inline-block;
            margin-top: 8px;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        .image-preview .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 地址字段 */
        .address-input-group {
            display: flex;
            gap: 6px;
        }

        .address-input-group input {
            flex: 1;
            background: #f8f8f8;
            cursor: pointer;
            user-select: all;
            -webkit-user-select: all;
        }

        .address-input-group .btn-copy {
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .address-input-group .btn-copy:hover {
            background: #e8f5e9;
            border-color: #27ae60;
            color: #27ae60;
        }

        .address-input-group .btn-copy.copied {
            background: #e8f5e9;
            border-color: #27ae60;
            color: #27ae60;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* 底部提示条 */
        .hint-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 999;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.3s;
            opacity: 0;
        }

        .hint-bar.show {
            opacity: 1;
        }

        /* 自定义地图标记样式 */
        .custom-marker {
            background: transparent !important;
            border: none !important;
        }

        .marker-pin {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(231,76,60,0.4);
            border: 3px solid #fff;
            transition: transform 0.2s;
        }

        .marker-pin.visited {
            background: #27ae60 !important;
            box-shadow: 0 2px 8px rgba(39,174,96,0.5);
            border-radius: 50%;
            transform: rotate(0deg);
        }

        .marker-pin.visited span {
            transform: rotate(0deg);
        }

        .marker-pin span {
            transform: rotate(45deg);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        .marker-pin:hover {
            transform: rotate(-45deg) scale(1.15);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .leaflet-popup-content {
            margin: 12px 16px;
            font-size: 14px;
            font-family: inherit;
        }

        .popup-content h4 {
            margin-bottom: 6px;
            font-size: 15px;
            color: var(--text);
        }

        .popup-content p {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .popup-content img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .popup-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .popup-actions .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                max-width: 360px;
                transform: translateX(100%);
                box-shadow: -4px 0 20px rgba(0,0,0,0.15);
                z-index: 1500;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.4);
                z-index: 1400;
                display: none;
            }

            .sidebar-backdrop.show {
                display: block;
            }

            .navbar .logo span {
                display: none;
            }

            .navbar .btn span.btn-text {
                display: none;
            }

            .navbar {
                padding: 8px 10px;
            }

            .map-controls {
                top: 70px;
                right: 8px;
            }

            .modal {
                width: 95%;
                max-height: 90vh;
                border-radius: 16px 16px 0 0;
                margin-top: auto;
                margin-bottom: 0;
                position: fixed;
                bottom: 0;
                left: 50%;
                transform: translateX(-50%);
            }

            .hint-bar {
                bottom: 24px;
            }
        }

        @media (min-width: 769px) {
            .sidebar-toggle-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-map-marked-alt"></i>
            <span>日本旅行地图</span>
        </div>
        <div class="navbar-actions">
            <button class="btn btn-outline btn-sm" onclick="exportMarkers()" title="导出数据">
                <i class="fas fa-download"></i><span class="btn-text">导出</span>
            </button>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()" title="导入数据">
                <i class="fas fa-upload"></i><span class="btn-text">导入</span>
            </button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importMarkers(event)">
            <button class="btn btn-outline btn-sm" onclick="clearAllMarkers()" title="清空标记">
                <i class="fas fa-trash-alt"></i><span class="btn-text">清空</span>
            </button>
            <button class="btn btn-primary btn-sm sidebar-toggle-mobile" onclick="toggleSidebar()" title="标记列表">
                <i class="fas fa-list"></i><span class="btn-text">列表</span>
                <span class="count" id="mobileCount" style="background:#fff;color:var(--primary);padding:1px 7px;border-radius:10px;font-size:11px;">0</span>
            </button>
        </div>
    </nav>

    <!-- 主体 -->
    <div class="main-container">
        <!-- 地图 -->
        <div class="map-wrapper">
            <div id="map"></div>

            <div class="map-controls">
                <button class="btn-icon" onclick="addMarkerAtCenter()" title="在当前视图中心添加标记">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="btn-icon" onclick="fitAllMarkers()" title="显示所有标记">
                    <i class="fas fa-expand-arrows-alt"></i>
                </button>
            </div>

            <div class="hint-bar" id="hintBar">
                <i class="fas fa-info-circle"></i>
                <span>在地图上点击即可添加标记，也可以拖拽地图选择位置后点 + 按钮</span>
            </div>
        </div>

        <!-- 侧边栏背景（移动端） -->
        <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>
                    <i class="fas fa-thumbtack"></i> 我的标记
                    <span class="count" id="markerCount">0</span>
                </h3>
                <button class="modal-close sidebar-toggle-mobile" onclick="toggleSidebar()" style="font-size:18px;">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- 搜索 -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索地点（输入后回车）..." onkeydown="if(event.key==='Enter')searchPlace()">
            </div>
            <div class="search-results" id="searchResults"></div>

            <!-- 标记列表 -->
            <div class="marker-list" id="markerList">
                <div class="marker-empty" id="markerEmpty">
                    <i class="fas fa-map-pin"></i>
                    <p>还没有添加任何标记<br>在地图上点击或搜索地点来添加吧！</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 标记编辑弹窗 -->
    <div class="modal-overlay" id="markerModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加标记</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>地点名称 *</label>
                    <input type="text" id="markerName" placeholder="例如：东京塔、浅草寺...">
                </div>
                <div class="form-group">
                    <label>地址 <span class="address-loading" id="addressLoading" style="display:none;font-weight:normal;color:#999;font-size:12px;">（获取中...）</span></label>
                    <div class="address-input-group">
                        <input type="text" id="markerAddress" placeholder="点击地图自动获取地址..." style="background:#f8f8f8;">
                        <button class="btn-copy" id="btnCopyAddress" onclick="copyAddress()" title="复制地址">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>计划日期</label>
                    <input type="date" id="markerDate">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="markerCategory">
                        <option value="sightseeing">🏯 观光景点</option>
                        <option value="food">🍣 美食餐厅</option>
                        <option value="shopping">🛍️ 购物</option>
                        <option value="hotel">🏨 住宿</option>
                        <option value="transport">🚃 交通枢纽</option>
                        <option value="other">📌 其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="markerDesc" placeholder="添加一些备注，比如开放时间、门票价格..."></textarea>
                </div>
                <div class="form-group">
                    <label>图片（截图/照片）</label>
                    <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>点击上传图片或粘贴截图</p>
                        <p style="font-size:11px;color:#bbb;">支持 JPG/PNG/GIF/WebP</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                    <div id="imagePreviewContainer"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveMarker()" id="saveBtn">保存标记</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // ==================== 全局状态 ====================
        let markers = [];
        let markerLayers = {};
        let editingMarkerId = null;
        let tempLatLng = null;
        let tempAddress = null;
        let currentImageData = null;
        let mapClickHandler = null;
        let lastReverseGeocode = 0; // 逆地理编码节流

        const STORAGE_KEY = 'japan_travel_markers';

        // 分类图标和颜色
        const categoryConfig = {
            sightseeing: { icon: '🏯', color: '#e74c3c', label: '观光景点' },
            food: { icon: '🍣', color: '#f39c12', label: '美食餐厅' },
            shopping: { icon: '🛍️', color: '#9b59b6', label: '购物' },
            hotel: { icon: '🏨', color: '#3498db', label: '住宿' },
            transport: { icon: '🚃', color: '#1abc9c', label: '交通枢纽' },
            other: { icon: '📌', color: '#95a5a6', label: '其他' }
        };

        // ==================== 逆地理编码（获取地址） ====================
        function reverseGeocode(lat, lng, callback) {
            const now = Date.now();
            const waitTime = Math.max(0, 1100 - (now - lastReverseGeocode));
            
            const doFetch = () => {
                lastReverseGeocode = Date.now();
                // 先用日语获取（含假名），fallback 用中文
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ja&zoom=18`)
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.display_name) {
                            callback(data.display_name, null);
                        } else {
                            callback(null, '未找到地址');
                        }
                    })
                    .catch(err => {
                        console.error('逆地理编码失败:', err);
                        callback(null, '获取地址失败');
                    });
            };

            if (waitTime > 0) {
                setTimeout(doFetch, waitTime);
            } else {
                doFetch();
            }
        }

        function copyAddress() {
            const input = document.getElementById('markerAddress');
            const btn = document.getElementById('btnCopyAddress');
            const text = input.value.trim();
            if (!text) return;

            copyTextToClipboard(text, function() {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i>';
                showHint('地址已复制 📋', 1500);
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i>';
                }, 2000);
            });
        }

        function copyTextToClipboard(text, onSuccess) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    if (onSuccess) onSuccess();
                }).catch(() => {
                    fallbackCopyText(text, onSuccess);
                });
            } else {
                fallbackCopyText(text, onSuccess);
            }
        }

        function fallbackCopyText(text, onSuccess) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                if (onSuccess) onSuccess();
            } catch(e) {
                showHint('复制失败，请长按地址手动复制', 2000);
            }
            document.body.removeChild(ta);
        }

        // ==================== 地图初始化 ====================
        const map = L.map('map', {
            center: [35.68, 139.76], // 东京
            zoom: 12,
            zoomControl: false,
            minZoom: 5,
            maxZoom: 19
        });

        // 缩放控件放在右下角
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // OpenStreetMap 瓦片（日本地区数据丰富，支持路名和地铁站显示）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19,
            // 日语标注优先
        }).addTo(map);

        // 添加公共交通图层（显示地铁站等）
        const transportLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors, H.O.T.'
        });

        // 地图点击事件
        map.on('click', function(e) {
            if (editingMarkerId !== null) return;
            tempLatLng = { lat: e.latlng.lat, lng: e.latlng.lng };
            tempAddress = null;
            openModal('add');
            // 异步获取地址
            const loadingEl = document.getElementById('addressLoading');
            const addressInput = document.getElementById('markerAddress');
            if (loadingEl) loadingEl.style.display = 'inline';
            if (addressInput) addressInput.value = '';
            reverseGeocode(e.latlng.lat, e.latlng.lng, function(address, error) {
                if (loadingEl) loadingEl.style.display = 'none';
                if (address) {
                    tempAddress = address;
                    if (addressInput) addressInput.value = address;
                } else {
                    if (addressInput) addressInput.value = error || '';
                }
            });
        });

        // 显示提示
        const hintBar = document.getElementById('hintBar');
        function showHint(msg, duration = 3000) {
            hintBar.querySelector('span').textContent = msg;
            hintBar.classList.add('show');
            clearTimeout(hintBar._timeout);
            hintBar._timeout = setTimeout(() => hintBar.classList.remove('show'), duration);
        }

        // 初始提示
        setTimeout(() => showHint('在地图上点击即可添加标记 🗺️', 4000), 1000);

        // ==================== 数据管理 ====================
        function loadMarkers() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    markers = JSON.parse(data);
                }
            } catch (e) {
                console.error('加载数据失败:', e);
                markers = [];
            }
        }

        function saveMarkers() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(markers));
            } catch (e) {
                console.error('保存数据失败:', e);
                showHint('保存失败，存储空间可能不足', 3000);
            }
        }

        function generateId() {
            return 'm_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        }

        // ==================== 地图标记渲染 ====================
        function renderAllMarkers() {
            // 清除旧标记
            Object.values(markerLayers).forEach(layer => {
                if (map.hasLayer(layer)) map.removeLayer(layer);
            });
            markerLayers = {};

            markers.forEach(marker => {
                renderMarkerOnMap(marker);
            });

            updateMarkerList();
            updateCounts();
        }

        function renderMarkerOnMap(marker) {
            const config = categoryConfig[marker.category] || categoryConfig.other;
            const visitedClass = marker.visited ? ' visited' : '';
            const icon = L.divIcon({
                className: 'custom-marker',
                html: `<div class="marker-pin${visitedClass}" style="background:${marker.visited ? '#27ae60' : config.color};">
                    <span>${marker.visited ? '✓' : (marker.number || config.icon)}</span>
                </div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 36],
                popupAnchor: [0, -36]
            });

            const layer = L.marker([marker.lat, marker.lng], { icon }).addTo(map);

            // Popup 内容
            let popupHtml = `<div class="popup-content">
                <h4>${config.icon} ${escapeHtml(marker.name)}${marker.visited ? ' <span style="color:#27ae60;font-size:12px;">✅ 已玩过</span>' : ''}</h4>`;
            if (marker.address) {
                const safeAddr = escapeHtml(marker.address);
                popupHtml += `<p class="popup-address" onclick="copyTextToClipboard(decodeURIComponent('${encodeURIComponent(marker.address)}'),function(){showHint('地址已复制 📋',1500)})" style="font-size:11px;color:#888;cursor:pointer;word-break:break-all;" title="点击复制地址">📍 ${safeAddr} <i class="fas fa-copy" style="font-size:10px;"></i></p>`;
            }
            if (marker.date) popupHtml += `<p>📅 ${marker.date}</p>`;
            if (marker.desc) popupHtml += `<p>${escapeHtml(marker.desc)}</p>`;
            if (marker.image) popupHtml += `<img src="${marker.image}" alt="${escapeHtml(marker.name)}" />`;
            popupHtml += `<div class="popup-actions">
                <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editMarkerById('${marker.id}')">
                    <i class="fas fa-edit"></i> 编辑
                </button>
                <button class="btn btn-outline btn-sm" style="color:${marker.visited ? '#f39c12' : '#27ae60'};border-color:${marker.visited ? '#f39c12' : '#27ae60'};"
                    onclick="event.stopPropagation();toggleVisited('${marker.id}')">
                    <i class="fas fa-${marker.visited ? 'undo' : 'check'}"></i> ${marker.visited ? '撤销' : '玩过'}
                </button>
                <button class="btn btn-outline btn-sm" style="color:var(--primary);border-color:var(--primary);" 
                    onclick="event.stopPropagation();deleteMarkerById('${marker.id}')">
                    <i class="fas fa-trash"></i> 删除
                </button>
            </div></div>`;

            layer.bindPopup(popupHtml, { maxWidth: 280 });

            markerLayers[marker.id] = layer;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 标记列表 ====================
        function updateMarkerList() {
            const listEl = document.getElementById('markerList');

            if (markers.length === 0) {
                listEl.innerHTML = `
                    <div class="marker-empty" id="markerEmpty">
                        <i class="fas fa-map-pin"></i>
                        <p>还没有添加任何标记<br>在地图上点击或搜索地点来添加吧！</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = markers.map((m, i) => {
                const config = categoryConfig[m.category] || categoryConfig.other;
                let imageHtml = m.image ? `<img src="${m.image}" class="marker-image-thumb" alt="" />` : '';
                const visitedBadge = m.visited ? '<span class="visited-badge"><i class="fas fa-check-circle"></i> 已玩过</span>' : '';
                const addressHtml = m.address ? `<div class="marker-desc" style="font-size:11px;color:#999;">📍 ${escapeHtml(m.address.substring(0, 50))}${m.address.length > 50 ? '...' : ''}</div>` : '';
                return `<div class="marker-item${m.visited ? ' visited' : ''}" data-id="${m.id}" onclick="flyToMarker('${m.id}')">
                    <div class="marker-header">
                        <div class="marker-number" style="background:${m.visited ? '#27ae60' : config.color}">${m.visited ? '✓' : (i + 1)}</div>
                        <div class="marker-title">${escapeHtml(m.name)}</div>
                        ${m.date ? `<div class="marker-date">📅 ${m.date}</div>` : ''}
                    </div>
                    ${visitedBadge}
                    ${addressHtml}
                    ${m.desc ? `<div class="marker-desc">${escapeHtml(m.desc)}</div>` : ''}
                    ${imageHtml}
                    <div class="marker-actions">
                        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editMarkerById('${m.id}')">
                            <i class="fas fa-edit"></i> 编辑
                        </button>
                        <button class="btn btn-outline btn-sm" style="color:${m.visited ? '#f39c12' : '#27ae60'};border-color:${m.visited ? '#f39c12' : '#27ae60'};" 
                            onclick="event.stopPropagation();toggleVisited('${m.id}')">
                            <i class="fas fa-${m.visited ? 'undo' : 'check'}"></i> ${m.visited ? '撤销' : '玩过'}
                        </button>
                        <button class="btn btn-outline btn-sm" style="color:var(--primary);border-color:var(--primary);" 
                            onclick="event.stopPropagation();deleteMarkerById('${m.id}')">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function updateCounts() {
            document.getElementById('markerCount').textContent = markers.length;
            document.getElementById('mobileCount').textContent = markers.length;
        }

        function flyToMarker(id) {
            const marker = markers.find(m => m.id === id);
            if (!marker) return;
            map.flyTo([marker.lat, marker.lng], 16, { duration: 1 });
            if (markerLayers[id]) {
                markerLayers[id].openPopup();
            }
            // 高亮列表项
            document.querySelectorAll('.marker-item').forEach(el => el.classList.remove('active'));
            const item = document.querySelector(`.marker-item[data-id="${id}"]`);
            if (item) item.classList.add('active');
            // 移动端关闭侧边栏
            if (window.innerWidth <= 768) toggleSidebar(false);
        }

        function fitAllMarkers() {
            if (markers.length === 0) {
                showHint('还没有添加标记');
                return;
            }
            const bounds = markers.map(m => [m.lat, m.lng]);
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
        }

        // ==================== 弹窗管理 ====================
        function openModal(mode, markerData = null) {
            const modal = document.getElementById('markerModal');
            const title = document.getElementById('modalTitle');
            const saveBtn = document.getElementById('saveBtn');

            document.getElementById('markerName').value = '';
            document.getElementById('markerAddress').value = '';
            document.getElementById('markerDate').value = '';
            document.getElementById('markerCategory').value = 'sightseeing';
            document.getElementById('markerDesc').value = '';
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('imageUploadArea').style.display = 'block';
            document.getElementById('addressLoading').style.display = 'none';
            currentImageData = null;

            if (mode === 'edit' && markerData) {
                editingMarkerId = markerData.id;
                title.textContent = '编辑标记';
                saveBtn.textContent = '保存修改';
                document.getElementById('markerName').value = markerData.name || '';
                document.getElementById('markerAddress').value = markerData.address || '';
                document.getElementById('markerDate').value = markerData.date || '';
                document.getElementById('markerCategory').value = markerData.category || 'sightseeing';
                document.getElementById('markerDesc').value = markerData.desc || '';
                if (markerData.image) {
                    currentImageData = markerData.image;
                    document.getElementById('imageUploadArea').style.display = 'none';
                    document.getElementById('imagePreviewContainer').innerHTML = `
                        <div class="image-preview">
                            <img src="${markerData.image}" alt="预览" />
                            <button class="remove-image" onclick="removeImage()">×</button>
                        </div>`;
                }
                tempLatLng = { lat: markerData.lat, lng: markerData.lng };
                tempAddress = markerData.address || null;
            } else {
                editingMarkerId = null;
                title.textContent = '添加标记';
                saveBtn.textContent = '保存标记';
            }

            // 如果是新建且已有 tempAddress（来自搜索），填入
            if (mode === 'add' && tempAddress) {
                document.getElementById('markerAddress').value = tempAddress;
            }

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            setTimeout(() => document.getElementById('markerName').focus(), 200);
        }

        function closeModal() {
            document.getElementById('markerModal').style.display = 'none';
            document.body.style.overflow = '';
            editingMarkerId = null;
            tempLatLng = null;
            tempAddress = null;
            currentImageData = null;
        }

        // 点击背景关闭
        document.getElementById('markerModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ==================== 图片处理 ====================
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showHint('图片大小不能超过 5MB', 3000);
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                // 压缩图片
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const maxW = 800, maxH = 600;
                    if (w > maxW || h > maxH) {
                        const ratio = Math.min(maxW / w, maxH / h);
                        w = Math.round(w * ratio);
                        h = Math.round(h * ratio);
                    }
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    currentImageData = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('imageUploadArea').style.display = 'none';
                    document.getElementById('imagePreviewContainer').innerHTML = `
                        <div class="image-preview">
                            <img src="${currentImageData}" alt="预览" />
                            <button class="remove-image" onclick="removeImage()">×</button>
                        </div>`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function removeImage() {
            currentImageData = null;
            document.getElementById('imageUploadArea').style.display = 'block';
            document.getElementById('imagePreviewContainer').innerHTML = '';
        }

        // 支持粘贴截图
        document.addEventListener('paste', function(e) {
            if (document.getElementById('markerModal').style.display !== 'flex') return;
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            const maxW = 800, maxH = 600;
                            if (w > maxW || h > maxH) {
                                const ratio = Math.min(maxW / w, maxH / h);
                                w = Math.round(w * ratio);
                                h = Math.round(h * ratio);
                            }
                            canvas.width = w;
                            canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            currentImageData = canvas.toDataURL('image/jpeg', 0.8);
                            document.getElementById('imageUploadArea').style.display = 'none';
                            document.getElementById('imagePreviewContainer').innerHTML = `
                                <div class="image-preview">
                                    <img src="${currentImageData}" alt="预览" />
                                    <button class="remove-image" onclick="removeImage()">×</button>
                                </div>`;
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(blob);
                    showHint('截图已粘贴！', 1500);
                    break;
                }
            }
        });

        // ==================== 保存/编辑/删除标记 ====================
        function saveMarker() {
            const nameEl = document.getElementById('markerName');
            const name = nameEl.value.trim();
            if (!name) {
                showHint('请输入地点名称', 2000);
                nameEl.focus();
                return;
            }

            if (!tempLatLng || typeof tempLatLng.lat === 'undefined' || typeof tempLatLng.lng === 'undefined') {
                showHint('请先在地图上选择位置（点击地图或搜索地点）', 3000);
                return;
            }

            const isNew = !editingMarkerId;
            const markerData = {
                id: editingMarkerId || generateId(),
                name: name,
                lat: tempLatLng.lat,
                lng: tempLatLng.lng,
                address: document.getElementById('markerAddress').value.trim() || null,
                date: document.getElementById('markerDate').value,
                category: document.getElementById('markerCategory').value,
                desc: document.getElementById('markerDesc').value.trim(),
                image: currentImageData || null,
                visited: editingMarkerId ? 
                    (markers.find(m => m.id === editingMarkerId)?.visited || false) : false,
                createdAt: editingMarkerId ? 
                    (markers.find(m => m.id === editingMarkerId)?.createdAt || new Date().toISOString()) : 
                    new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            if (editingMarkerId) {
                const index = markers.findIndex(m => m.id === editingMarkerId);
                if (index !== -1) {
                    markers[index] = markerData;
                }
            } else {
                markers.push(markerData);
            }

            // 重新编号
            markers.forEach((m, i) => { m.number = i + 1; });

            // 先持久化
            try {
                saveMarkers();
            } catch(e) {
                console.error('保存失败:', e);
            }

            // 同步更新标记列表和地图
            if (editingMarkerId && markerLayers[editingMarkerId]) {
                // 编辑：移除旧标记再添加新的
                const oldLayer = markerLayers[editingMarkerId];
                if (map.hasLayer(oldLayer)) map.removeLayer(oldLayer);
                delete markerLayers[editingMarkerId];
                renderMarkerOnMap(markerData);
            } else if (isNew) {
                // 新增：直接渲染
                renderMarkerOnMap(markerData);
            }

            // 更新侧边栏列表和数字（在关闭弹窗前完成）
            updateMarkerList();
            updateCounts();

            // 立即关闭弹窗
            closeModal();

            // 保存后飞到标记位置
            if (isNew) {
                flyToMarker(markerData.id);
            } else {
                // 编辑后也飞到对应位置
                map.flyTo([markerData.lat, markerData.lng], 16, { duration: 0.5 });
            }

            showHint(isNew ? '标记已添加 ✅' : '标记已更新 ✅', 2000);
            
            // 确保数字一定更新（双重保险）
            requestAnimationFrame(() => updateCounts());
        }

        function editMarkerById(id) {
            const marker = markers.find(m => m.id === id);
            if (!marker) return;
            openModal('edit', marker);
        }

        function toggleVisited(id) {
            const marker = markers.find(m => m.id === id);
            if (!marker) return;
            marker.visited = !marker.visited;
            marker.updatedAt = new Date().toISOString();
            saveMarkers();

            // 移除旧图层，重新渲染该标记
            if (markerLayers[id]) {
                try {
                    markerLayers[id].closePopup();
                    if (map.hasLayer(markerLayers[id])) map.removeLayer(markerLayers[id]);
                } catch(e) {}
                delete markerLayers[id];
            }
            renderMarkerOnMap(marker);

            // 刷新列表
            updateMarkerList();
            updateCounts();

            showHint(marker.visited ? '🎉 标记为已玩过！' : '已撤销玩过状态', 2000);
        }

        function deleteMarkerById(id) {
            if (!confirm('确定要删除这个标记吗？此操作不可撤销。')) return;
            
            // 先从数组中移除
            markers = markers.filter(m => m.id !== id);
            markers.forEach((m, i) => { m.number = i + 1; });
            saveMarkers();
            
            // 先关闭该标记的弹出窗口（避免移除时 Leaflet 出错）
            if (markerLayers[id]) {
                try {
                    markerLayers[id].closePopup();
                    if (map.hasLayer(markerLayers[id])) map.removeLayer(markerLayers[id]);
                } catch(e) {
                    console.warn('移除图层失败:', e);
                }
                delete markerLayers[id];
            }
            
            // 立即更新列表和数字
            updateMarkerList();
            updateCounts();
            
            showHint('标记已删除', 2000);
        }

        function clearAllMarkers() {
            if (markers.length === 0) {
                showHint('没有可清空的标记');
                return;
            }
            if (!confirm(`确定要清空全部 ${markers.length} 个标记吗？\n\n建议先导出备份。此操作不可撤销。`)) return;
            
            // 清除所有地图图层
            Object.values(markerLayers).forEach(layer => {
                if (map.hasLayer(layer)) map.removeLayer(layer);
            });
            markerLayers = {};
            
            markers = [];
            saveMarkers();
            updateMarkerList();
            updateCounts();
            showHint('所有标记已清空', 2000);
        }

        function addMarkerAtCenter() {
            const center = map.getCenter();
            tempLatLng = { lat: center.lat, lng: center.lng };
            tempAddress = null;
            openModal('add');
            // 异步获取地址
            document.getElementById('addressLoading').style.display = 'inline';
            const addressInput = document.getElementById('markerAddress');
            if (addressInput) addressInput.value = '';
            reverseGeocode(center.lat, center.lng, function(address, error) {
                document.getElementById('addressLoading').style.display = 'none';
                if (address) {
                    tempAddress = address;
                    if (addressInput) addressInput.value = address;
                } else {
                    if (addressInput) addressInput.value = error || '';
                }
            });
        }

        // ==================== 搜索地点 ====================
        function searchPlace() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            // 使用 Nominatim API 搜索
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=jp&limit=8&accept-language=zh`)
                .then(res => res.json())
                .then(data => {
                    const resultsEl = document.getElementById('searchResults');
                    if (data.length === 0) {
                        resultsEl.innerHTML = '<div class="search-result-item" style="color:#999;">未找到相关地点</div>';
                        resultsEl.classList.add('show');
                        return;
                    }
                    resultsEl.innerHTML = data.map((item, i) => `
                        <div class="search-result-item" data-lat="${item.lat}" data-lon="${item.lon}" data-name="${escapeHtml(item.display_name).replace(/"/g, '&quot;')}">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${escapeHtml(item.display_name)}</span>
                        </div>
                    `).join('');
                    resultsEl.classList.add('show');
                })
                .catch(err => {
                    console.error('搜索失败:', err);
                    showHint('搜索失败，请重试', 2000);
                });
        }

        function selectSearchResult(lat, lng, displayName) {
            // 设置临时坐标
            tempLatLng = { lat: parseFloat(lat), lng: parseFloat(lng) };
            // 搜索结果的地名作为地址
            tempAddress = displayName;
            // 先关闭搜索结果
            document.getElementById('searchResults').classList.remove('show');
            document.getElementById('searchInput').value = '';
            // 飞往目标位置
            map.flyTo([lat, lng], 16, { duration: 1 });
            // 打开弹窗
            openModal('add');
            // 在 openModal 之后设置名称（因为 openModal 会清空表单）
            const name = displayName.split(',')[0].trim();
            document.getElementById('markerName').value = name;
            // 地址已通过 tempAddress 在 openModal 中填入
            // 同时用逆地理获取更精确的日语地址（如果搜索结果不是日语的）
            if (!/[\u3040-\u309f\u30a0-\u30ff]/.test(displayName)) {
                const addressInput = document.getElementById('markerAddress');
                document.getElementById('addressLoading').style.display = 'inline';
                reverseGeocode(lat, lng, function(address, error) {
                    document.getElementById('addressLoading').style.display = 'none';
                    if (address) {
                        tempAddress = address;
                        if (addressInput) addressInput.value = address;
                    }
                });
            }
        }

        // 使用事件委托处理搜索结果点击
        document.getElementById('searchResults').addEventListener('click', function(e) {
            const item = e.target.closest('.search-result-item');
            if (!item) return;
            const lat = item.getAttribute('data-lat');
            const lon = item.getAttribute('data-lon');
            const name = item.getAttribute('data-name');
            if (lat && lon && name) {
                selectSearchResult(lat, lon, name);
            }
        });

        // 点击其他地方关闭搜索结果（排除搜索结果项）
        document.addEventListener('click', function(e) {
            const resultsEl = document.getElementById('searchResults');
            const searchInput = document.getElementById('searchInput');
            if (resultsEl.classList.contains('show') && 
                !resultsEl.contains(e.target) && 
                e.target !== searchInput) {
                resultsEl.classList.remove('show');
            }
        });

        // ==================== 导入导出 ====================
        function exportMarkers() {
            if (markers.length === 0) {
                showHint('没有数据可导出');
                return;
            }
            const data = JSON.stringify(markers, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `japan_travel_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showHint('数据已导出 ✅', 2000);
        }

        function importMarkers(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data)) throw new Error('格式错误');

                    const importCount = data.length;
                    // 合并导入（相同位置的标记不会重复添加，通过ID去重）
                    const existingIds = new Set(markers.map(m => m.id));
                    let addedCount = 0;
                    data.forEach(m => {
                        if (!existingIds.has(m.id)) {
                            markers.push(m);
                            addedCount++;
                        }
                    });

                    markers.forEach((m, i) => { m.number = i + 1; });
                    saveMarkers();
                    renderAllMarkers();
                    fitAllMarkers();
                    showHint(`成功导入 ${addedCount} 个新标记（共 ${importCount} 条数据）`, 3000);
                } catch (err) {
                    console.error('导入失败:', err);
                    showHint('导入失败：文件格式不正确', 3000);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ==================== 侧边栏（移动端） ====================
        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const isOpen = force !== undefined ? force : !sidebar.classList.contains('open');

            if (isOpen) {
                sidebar.classList.add('open');
                backdrop.classList.add('show');
                document.body.style.overflow = 'hidden';
            } else {
                sidebar.classList.remove('open');
                backdrop.classList.remove('show');
                document.body.style.overflow = '';
            }
        }

        // ==================== 响应式处理 ====================
        function handleResize() {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarBackdrop').classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        window.addEventListener('resize', handleResize);

        // ==================== 初始化 ====================
        function init() {
            loadMarkers();
            renderAllMarkers();
            if (markers.length > 0) {
                fitAllMarkers();
            }

            // 添加一些示例标记（首次使用时）
            if (markers.length === 0 && !localStorage.getItem(STORAGE_KEY + '_initialized')) {
                const samples = [
                    { name: '东京塔', lat: 35.6586, lng: 139.7454, category: 'sightseeing', desc: '东京标志性建筑，夜景很美', date: '', visited: false },
                    { name: '浅草寺', lat: 35.7148, lng: 139.7967, category: 'sightseeing', desc: '东京最古老的寺庙', date: '', visited: false },
                    { name: '涩谷十字路口', lat: 35.6595, lng: 139.7004, category: 'shopping', desc: '世界最繁忙的十字路口', date: '', visited: false },
                ];
                samples.forEach(s => {
                    markers.push({
                        id: generateId(),
                        ...s,
                        image: null,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    });
                });
                markers.forEach((m, i) => { m.number = i + 1; });
                saveMarkers();
                renderAllMarkers();
                fitAllMarkers();
                localStorage.setItem(STORAGE_KEY + '_initialized', '1');
            }
        }

        init();

        console.log('🗾 日本旅行地图已就绪！');
        console.log('💡 提示：在地图上点击添加标记，支持文本和图片');
        console.log('📱 数据保存在浏览器本地存储中');
    </script>
</body>
</html>
